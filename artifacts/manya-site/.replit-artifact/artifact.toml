kind = "web"
previewPath = "/"
title = "Manya"
version = "1.0.0"
id = "artifacts/manya-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24976

[services.development]
run = "pnpm --filter @workspace/manya-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manya-site", "run", "build" ]
publicDir = "artifacts/manya-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24976"
BASE_PATH = "/"
