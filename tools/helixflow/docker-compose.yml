services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: "8100"
      JWT_SECRET: local-helixflow-secret-change-me
      CORS_ORIGIN: http://localhost:5174
    ports:
      - "8100:8100"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8100/api
    depends_on:
      - backend
    ports:
      - "5174:5174"
