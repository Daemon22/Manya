<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lycon — New Tab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif; }
    body {
      background: radial-gradient(ellipse at top, #2a2143 0%, #1a1625 60%);
      color: #f5f3fa;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    body.light {
      background: radial-gradient(ellipse at top, #f4f2f9 0%, #ffffff 60%);
      color: #1a1625;
    }
    .logo { margin-bottom: 28px; animation: floaty 4s ease-in-out infinite; }
    @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    .brand { font-size: 32px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 6px; }
    .brand .accent { color: var(--accent); }
    .tagline { font-size: 13px; color: #b0a8c8; margin-bottom: 36px; }
    body.light .tagline { color: #4b4566; }

    .search-wrap {
      width: 100%; max-width: 620px;
      display: flex; align-items: center;
      background: rgba(45,37,66,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 26px;
      padding: 4px 6px 4px 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    body.light .search-wrap {
      background: rgba(255,255,255,0.9);
      border-color: rgba(0,0,0,0.08);
    }
    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 20%, transparent), 0 8px 32px rgba(0,0,0,0.2);
    }
    .search-wrap svg { color: #b0a8c8; flex-shrink: 0; }
    body.light .search-wrap svg { color: #8a82a3; }
    .search-input {
      flex: 1; border: 0; outline: none; background: transparent;
      font-size: 15px; color: inherit; padding: 12px;
    }
    .search-btn {
      background: var(--accent); color: #fff; border: 0;
      padding: 10px 22px; border-radius: 22px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .search-btn:hover { opacity: 0.9; }
    .search-btn:active { transform: scale(0.96); }

    .engine-label { font-size: 11px; color: #6e6688; margin-top: 12px; }
    body.light .engine-label { color: #8a82a3; }
    .engine-label b { color: var(--accent); }

    .shortcuts {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; width: 100%; max-width: 620px; margin-top: 44px;
    }
    .shortcut {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 18px 8px; border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: inherit; text-decoration: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
    }
    body.light .shortcut {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.05);
    }
    .shortcut:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    body.light .shortcut:hover {
      background: rgba(0,0,0,0.06);
    }
    .shortcut-icon { font-size: 26px; }
    .shortcut-title { font-size: 12px; color: #b0a8c8; }
    body.light .shortcut-title { color: #4b4566; }

    .footer { margin-top: 50px; font-size: 11px; color: #6e6688; }
    body.light .footer { color: #8a82a3; }
    .footer b { color: var(--accent); }
  </style>
</head>
<body>
  <div class="logo">
    <img src="./assets/wolf-logo.png" alt="Lycon — fierce wolf mascot" width="140" height="140" style="filter: drop-shadow(0 8px 24px rgba(251,84,43,0.4));" />
  </div>
  <div class="brand">L<span class="accent">y</span>con</div>
  <div class="tagline">Browse wild. Browse free.</div>

  <form class="search-wrap" id="search-form">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search-input" id="q" type="text" placeholder="Search or type a URL" autocomplete="off" spellcheck="false" autofocus />
    <button class="search-btn" type="submit">Search</button>
  </form>
  <div class="engine-label">Powered by <b id="engine-name">Brave Search</b> — your queries never get tracked</div>

  <div class="shortcuts" id="shortcuts"></div>

  <div class="footer">🦊 <b>Lycon</b> v1.0 · Privacy-first browsing</div>

  <script>
    // Read settings from URL query parameters (?engine=brave&accent=orange&theme=dark)
    const params = new URLSearchParams(location.search);
    const engineName = params.get('engine') || 'brave';
    const accent = params.get('accent') || 'orange';
    const theme = params.get('theme') || 'dark';

    const accentColors = { orange: '#FB542B', purple: '#7B2FE3', pink: '#E84393' };
    document.documentElement.style.setProperty('--accent', accentColors[accent] || accentColors.orange);
    if (theme === 'light') document.body.classList.add('light');

    const engineNames = {
      brave: 'Brave Search', duckduckgo: 'DuckDuckGo', google: 'Google',
      bing: 'Bing', startpage: 'Startpage'
    };
    const engineUrls = {
      brave: 'https://search.brave.com/search?q=',
      duckduckgo: 'https://duckduckgo.com/?q=',
      google: 'https://www.google.com/search?q=',
      bing: 'https://www.bing.com/search?q=',
      startpage: 'https://www.startpage.com/sp/search?query='
    };

    document.getElementById('engine-name').textContent = engineNames[engineName] || 'Brave Search';
    document.getElementById('q').placeholder = 'Search ' + (engineNames[engineName] || 'Brave Search') + ' or type a URL';

    const shortcuts = [
      { title: 'Brave Search', url: 'https://search.brave.com', icon: '🦁' },
      { title: 'YouTube',      url: 'https://youtube.com',      icon: '▶️' },
      { title: 'Wikipedia',    url: 'https://wikipedia.org',    icon: '📚' },
      { title: 'GitHub',       url: 'https://github.com',       icon: '🐙' },
      { title: 'Reddit',       url: 'https://reddit.com',       icon: '👽' },
      { title: 'Hacker News',  url: 'https://news.ycombinator.com', icon: '📰' },
      { title: 'MDN',          url: 'https://developer.mozilla.org', icon: '📘' },
      { title: 'ProtonMail',   url: 'https://proton.me/mail',   icon: '✉️' },
    ];

    const scEl = document.getElementById('shortcuts');
    shortcuts.forEach(s => {
      const a = document.createElement('a');
      a.className = 'shortcut';
      a.href = s.url;
      a.title = s.title;
      a.innerHTML = `<span class="shortcut-icon">${s.icon}</span><span class="shortcut-title">${s.title}</span>`;
      scEl.appendChild(a);
    });

    const URL_RE = /^(https?:\/\/|file:\/\/)/i;
    const DOMAIN_RE = /^([a-z0-9-]+\.)+[a-z]{2,}(:\d+)?(\/.*)?$/i;

    function resolve(text) {
      text = (text || '').trim();
      if (!text) return '';
      if (URL_RE.test(text)) return text;
      if (DOMAIN_RE.test(text)) return 'https://' + text;
      return (engineUrls[engineName] || engineUrls.brave) + encodeURIComponent(text);
    }

    document.getElementById('search-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const url = resolve(document.getElementById('q').value);
      if (url) window.location.href = url;
    });
  </script>
</body>
</html>
