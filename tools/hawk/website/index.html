<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawk - Device Detection & Environment Monitoring</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Hawk</h1>
            <p class="subtitle">Device Detection & Environment Monitoring</p>
        </header>
        <main class="main-content">
            <section class="section">
                <h2>Live Device Scanner</h2>
                <div id="scanner-container" class="scanner-container">
                    <button id="scan-button" class="scan-button">Scan Your Device</button>
                    <div id="scan-status" style="margin-top: 15px; color: var(--text-muted); display: none;">Initializing scanner...</div>
                    <div id="results" class="results" style="display: none;"></div>
                </div>
            </section>
            <section class="section footer-section">
                <h3>About</h3>
                <p><strong>Author:</strong> Uviwe Menyiwe (Azura)</p>
                <p><strong>Organization:</strong> Hael Foundation</p>
                <p><strong>License:</strong> MIT</p>
            </section>
        </main>
    </div>
    <script src="hawk.js"></script>
    <script src="script.js"></script>
</body>
</html>
