services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: usinga_api_nexus
      POSTGRES_USER: usinga
      POSTGRES_PASSWORD: usinga_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://usinga:usinga_dev@postgres:5432/usinga_api_nexus
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-dev-secret-change-me
      ENCRYPTION_KEY: ""
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:

